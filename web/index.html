<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap Spaces — masa vuruşu konumlandırma</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --line: #232937;
    --text: #e6e9f0;
    --dim: #8b93a7;
    --accent: #4da3ff;
    --hot: #ff5c7a;
    --ok: #3ddc97;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px; border-bottom: 1px solid var(--line);
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .sub { color: var(--dim); font-size: 13px; }
  .spacer { flex: 1; }

  .meter {
    width: 140px; height: 6px; border-radius: 3px;
    background: var(--line); overflow: hidden;
  }
  .meter > i {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--ok), #f5c542, var(--hot));
    transition: width 80ms linear;
  }

  main {
    display: grid; grid-template-columns: 1fr 320px;
    gap: 24px; padding: 24px; align-items: start;
    max-width: 1180px; margin: 0 auto;
  }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

  /* ---- quadrant board ---- */
  .board {
    position: relative; aspect-ratio: 4 / 3;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: 10px; background: var(--panel);
    border: 1px solid var(--line); border-radius: var(--radius); padding: 10px;
  }
  .zone {
    position: relative; border-radius: 10px; border: 1px solid var(--line);
    background: #10141c; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: background 140ms, border-color 140ms, transform 140ms;
    user-select: none;
  }
  .zone:hover { border-color: #33405a; }
  .zone .name { font-size: 15px; font-weight: 600; }
  .zone .pct { font-size: 12px; color: var(--dim); font-variant-numeric: tabular-nums; }
  .zone .count {
    position: absolute; top: 10px; right: 12px;
    font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums;
  }
  .zone.armed { border-color: var(--accent); background: #12203300; box-shadow: inset 0 0 0 1px var(--accent); }
  .zone.hit {
    background: #17324f; border-color: var(--accent);
    transform: scale(1.015);
    box-shadow: 0 0 0 1px var(--accent), 0 0 40px -6px var(--accent);
  }
  .zone .bar {
    position: absolute; left: 10px; right: 10px; bottom: 10px; height: 3px;
    border-radius: 2px; background: var(--line); overflow: hidden;
  }
  .zone .bar > i {
    display: block; height: 100%; width: 0%; background: var(--accent);
    transition: width 200ms ease;
  }

  /* laptop in the middle of the four zones */
  .laptop {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 132px; pointer-events: none; z-index: 2;
  }
  .laptop .screen {
    height: 62px; border: 2px solid #3a445c; border-radius: 6px 6px 2px 2px;
    background: #0b0d12;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--dim); letter-spacing: 0.08em;
  }
  .laptop .base {
    height: 7px; margin: 2px -14px 0; border-radius: 0 0 6px 6px;
    background: #2b3346;
  }

  /* ---- side panel ---- */
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px; display: grid; gap: 16px;
  }
  .row { display: flex; align-items: center; gap: 10px; }
  .label { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }

  .seg { display: flex; background: #0e1219; border: 1px solid var(--line); border-radius: 9px; padding: 3px; }
  .seg button {
    flex: 1; border: 0; background: transparent; color: var(--dim);
    padding: 7px 10px; border-radius: 6px; font: inherit; font-size: 13px;
    cursor: pointer; transition: background 120ms, color 120ms;
  }
  .seg button.on { background: var(--accent); color: #06121f; font-weight: 600; }

  button.btn {
    border: 1px solid var(--line); background: #0e1219; color: var(--text);
    padding: 8px 12px; border-radius: 8px; font: inherit; font-size: 13px; cursor: pointer;
  }
  button.btn:hover { border-color: #33405a; }
  button.btn.danger:hover { border-color: var(--hot); color: var(--hot); }

  input[type=range] { width: 100%; accent-color: var(--accent); }

  .stat { display: flex; justify-content: space-between; font-size: 13px; }
  .stat b { font-variant-numeric: tabular-nums; font-weight: 600; }

  .hint {
    font-size: 12.5px; color: var(--dim); line-height: 1.55;
    border-left: 2px solid var(--line); padding-left: 12px;
  }

  .log {
    font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--dim); max-height: 150px; overflow-y: auto;
  }
  .log div { white-space: nowrap; }
  .log b { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>Tap Spaces</h1>
  <span class="sub" id="statusText">bağlanıyor…</span>
  <div class="spacer"></div>
  <span class="sub">mikrofon</span>
  <div class="meter"><i id="meter"></i></div>
</header>

<main>
  <div class="board" id="board">
    <div class="zone" data-zone="TL">
      <span class="count" data-count="TL">0</span>
      <span class="name">Sol Üst</span>
      <span class="pct" data-pct="TL">—</span>
      <span class="bar"><i data-bar="TL"></i></span>
    </div>
    <div class="zone" data-zone="TR">
      <span class="count" data-count="TR">0</span>
      <span class="name">Sağ Üst</span>
      <span class="pct" data-pct="TR">—</span>
      <span class="bar"><i data-bar="TR"></i></span>
    </div>
    <div class="zone" data-zone="BL">
      <span class="count" data-count="BL">0</span>
      <span class="name">Sol Alt</span>
      <span class="pct" data-pct="BL">—</span>
      <span class="bar"><i data-bar="BL"></i></span>
    </div>
    <div class="zone" data-zone="BR">
      <span class="count" data-count="BR">0</span>
      <span class="name">Sağ Alt</span>
      <span class="pct" data-pct="BR">—</span>
      <span class="bar"><i data-bar="BR"></i></span>
    </div>
    <div class="laptop">
      <div class="screen">MacBook</div>
      <div class="base"></div>
    </div>
  </div>

  <div class="panel">
    <div>
      <div class="label" style="margin-bottom:8px">Mod</div>
      <div class="seg" id="modeSeg">
        <button data-mode="train">Kalibrasyon</button>
        <button data-mode="predict" class="on">Canlı</button>
      </div>
    </div>

    <div class="hint" id="hint"></div>

    <div>
      <div class="label" style="margin-bottom:8px">Hassasiyet</div>
      <input type="range" id="sens" min="0" max="100" value="50">
      <div class="row" style="justify-content:space-between">
        <span class="sub">sert vuruş</span><span class="sub">hafif vuruş</span>
      </div>
    </div>

    <div style="display:grid; gap:6px">
      <div class="stat"><span class="sub">Toplam örnek</span><b id="total">0</b></div>
      <div class="stat"><span class="sub">Tahmini doğruluk</span><b id="acc">—</b></div>
    </div>

    <div class="row">
      <button class="btn" id="save" style="flex:1">Kaydet</button>
      <button class="btn" id="load" style="flex:1">Yükle</button>
      <button class="btn danger" id="clear" style="flex:1">Temizle</button>
    </div>

    <div>
      <div class="label" style="margin-bottom:8px">Son vuruşlar</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</main>

<script>
const ZONES = ["TL", "TR", "BL", "BR"];
const NAMES = { TL: "Sol Üst", TR: "Sağ Üst", BL: "Sol Alt", BR: "Sağ Alt" };

let mode = "predict";
let armed = "TL";

const $ = (s) => document.querySelector(s);
const el = {
  meter: $("#meter"), status: $("#statusText"), hint: $("#hint"),
  total: $("#total"), acc: $("#acc"), log: $("#log"), sens: $("#sens"),
};

function post(path, body) {
  return fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body || {}),
  }).then((r) => r.json());
}

function renderMode() {
  document.querySelectorAll("#modeSeg button").forEach((b) =>
    b.classList.toggle("on", b.dataset.mode === mode));
  document.querySelectorAll(".zone").forEach((z) =>
    z.classList.toggle("armed", mode === "train" && z.dataset.zone === armed));
  el.hint.innerHTML = mode === "train"
    ? `Bir bölge seç, sonra masanın <b>o noktasına</b> vur. Her bölge için 20–30 vuruş topla.
       Vuruş sertliğini ve tam noktayı biraz değiştir — model böylece genelleşir.`
    : `Masaya vur, tahmin edilen bölge yanar. Doğruluk düşükse Kalibrasyon'a dön ve
       zayıf bölgeye örnek ekle. Laptop veya masa yer değiştirirse yeniden kalibre et.`;
}

function applyState(s) {
  if (!s || !s.counts) return;
  let total = 0;
  ZONES.forEach((z) => {
    const c = s.counts[z] || 0;
    total += c;
    document.querySelector(`[data-count="${z}"]`).textContent = c;
  });
  el.total.textContent = total;
  el.acc.textContent = s.accuracy == null
    ? "—" : Math.round(s.accuracy * 100) + "%";
  el.acc.style.color = s.accuracy == null ? ""
    : s.accuracy > 0.8 ? "var(--ok)" : s.accuracy > 0.6 ? "#f5c542" : "var(--hot)";
  if (typeof s.sensitivity === "number") el.sens.value = s.sensitivity;
  if (s.mode) { mode = s.mode; }
  if (s.train_label) { armed = s.train_label; }
  renderMode();
}

function flash(zone) {
  const node = document.querySelector(`[data-zone="${zone}"]`);
  node.classList.add("hit");
  setTimeout(() => node.classList.remove("hit"), 450);
}

function showScores(scores) {
  ZONES.forEach((z) => {
    const v = Math.round((scores[z] || 0) * 100);
    document.querySelector(`[data-pct="${z}"]`).textContent = v + "%";
    document.querySelector(`[data-bar="${z}"]`).style.width = v + "%";
  });
}

function log(text) {
  const d = document.createElement("div");
  d.innerHTML = text;
  el.log.prepend(d);
  while (el.log.children.length > 40) el.log.lastChild.remove();
}

// --- zone clicks pick the calibration target ---
document.querySelectorAll(".zone").forEach((z) => {
  z.addEventListener("click", () => {
    armed = z.dataset.zone;
    if (mode !== "train") mode = "train";
    post("/mode", { mode, label: armed }).then(applyState);
  });
});

document.querySelectorAll("#modeSeg button").forEach((b) => {
  b.addEventListener("click", () => {
    mode = b.dataset.mode;
    post("/mode", { mode, label: armed }).then(applyState);
  });
});

el.sens.addEventListener("change", () =>
  post("/sensitivity", { value: Number(el.sens.value) }).then(applyState));

$("#save").addEventListener("click", () =>
  post("/save").then(() => log("<b>model kaydedildi</b>")));
$("#load").addEventListener("click", () =>
  post("/load").then(applyState));
$("#clear").addEventListener("click", () => {
  const which = mode === "train" ? armed : null;
  post("/clear", { label: which }).then((s) => {
    applyState(s);
    log(`<b>temizlendi:</b> ${which ? NAMES[which] : "tümü"}`);
  });
});

// --- live event stream ---
const es = new EventSource("/events");
es.onopen = () => { el.status.textContent = "dinleniyor"; };
es.onerror = () => { el.status.textContent = "bağlantı koptu"; };
es.onmessage = (e) => {
  const m = JSON.parse(e.data);
  if (m.type === "level") {
    el.meter.style.width = Math.min(100, m.value * 900) + "%";
    return;
  }
  if (m.type === "tap") {
    flash(m.zone);
    showScores(m.scores);
    const conf = Math.round(m.scores[m.zone] * 100);
    log(`<b>${NAMES[m.zone]}</b> — güven %${conf}`);
  } else if (m.type === "trained") {
    flash(m.label);
    applyState({ counts: m.counts, accuracy: m.accuracy });
    log(`kayıt → <b>${NAMES[m.label]}</b> (${m.counts[m.label]})`);
  } else if (m.type === "untrained") {
    log("vuruş algılandı ama model boş — önce kalibrasyon yap");
  } else if (m.type === "error") {
    log(`<b>hata:</b> ${m.message}`);
  }
};

fetch("/state").then((r) => r.json()).then(applyState);
renderMode();
</script>
</body>
</html>
